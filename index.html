  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #010614;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    #c { display: block; position: fixed; top: 0; left: 0; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      pointer-events: none;
      z-index: 10;
    }
    #date-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-variant-numeric: tabular-nums;

    }
    #now-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      padding: 5px 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #now-btn:active { background: rgba(255,255,255,0.18); }

    /* Info panel */
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(4, 8, 26, 0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(100, 130, 255, 0.2);

      padding: 20px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
      max-height: 72vh;
      overflow-y: auto;
    }
    #panel.open { transform: translateY(0); }
    #panel.above-zoom { z-index: 40; }

    #panel-header {
      display: flex; flex-direction: column;
      gap: 10px; margin-bottom: 14px;
    }
    #panel-header-top {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    #panel-header-body {
      display: flex; flex-direction: row; align-items: stretch; gap: 12px;
    }
    #panel-name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    }
    #panel-type {
      font-size: 12px; color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }
    #panel-close {
      background: rgba(255,255,255,0.08);

    #panel-img {
      flex: 1; min-width: 0;

    .stat-grid {
      display: grid; grid-template-columns: 1fr;

    }
    .stat-box {
      background: rgba(255,255,255,0.055);

    .stat-label {
      font-size: 10px; color: rgba(255,255,255,0.38);

    .stat-val { font-size: 15px; font-weight: 600; }

    #panel-facts {

    #zoom-btn {
      display: block; width: 100%; margin-top: 14px;

      background: rgba(100,130,255,0.10);

    /* Zoom view */
    #zoom-view {
      position: fixed; inset: 0;

    #zoom-header {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;

      justify-self: center;
    }
    #zoom-title { font-size: 18px; font-weight: 600; }
    #zoom-date-label {
      font-size: 11px; color: rgba(255,255,255,0.35);
      font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
    }
    #zoom-back {
      background: rgba(100,130,255,0.12);
      border: 1px solid rgba(100,130,255,0.25);

    #zoom-hint {

    }
    #zoom-canvas { flex: 1 1 0; min-height: 0; display: block; width: 100%; }

    /* Moon info sheet */
    #moon-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(4,8,26,0.97);
      border-top: 1px solid rgba(100,130,255,0.2);
      border-radius: 20px 20px 0 0;
      padding: 18px 20px 32px;
      max-height: 65%;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);

    #moon-info.open { transform: translateY(0); }
    #moon-info-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 10px;
    }
    #moon-info-name { font-size: 22px; font-weight: 700; }
    #moon-info-sub { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 2px; }
    #moon-info-close {
      background: rgba(255,255,255,0.08); border: none; border-radius: 50%;
      width: 28px; height: 28px; color: rgba(255,255,255,0.55);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #moon-info-body {
      display: flex; flex-direction: row; align-items: stretch;
      gap: 12px; margin-bottom: 12px;
    }
    #moon-info-img {
      flex: 1; min-width: 0;
      border-radius: 14px;
      object-fit: contain;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }
    .moon-stat-row {
      display: grid; grid-template-columns: 1fr;

    }
    #moon-info-fact {
      font-size: 12px; color: rgba(255,255,255,0.48); line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.07); padding-top: 12px;
    }
  </style>

  <script>
    // ── Telegram WebApp ──────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); }

    // ── Canvas ───────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy, maxR;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2; cy = H / 2;
      maxR = Math.min(W, H) / 2 * 0.87;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── View transform (pan + pinch-zoom) ────────────────────────────
    const ORBIT_SCALE = 2;          // множитель размера орбит (1 = стандарт)
    let viewScale = 0.7, viewOX = 0, viewOY = 0;
    const VIEW_MIN = 0.45, VIEW_MAX = 6;

    function clampView() {
      viewScale = Math.max(VIEW_MIN, Math.min(VIEW_MAX, viewScale));
      // При viewScale<=1 сдвиг запрещён (система видна целиком)
      if (viewScale <= 1) { viewOX = 0; viewOY = 0; return; }
      const limit = maxR * ORBIT_SCALE * viewScale;
      viewOX = Math.max(-limit, Math.min(limit, viewOX));
      viewOY = Math.max(-limit, Math.min(limit, viewOY));
    }

    // Обратное преобразование: экранные координаты → мировые (canvas-space)
    // offsetX = cx*(1-viewScale) + viewOX  →  x = (sx - offsetX) / viewScale
    function screenToWorld(sx, sy) {
      const offX = cx * (1 - viewScale) + viewOX;
      const offY = cy * (1 - viewScale) + viewOY;
      return { x: (sx - offX) / viewScale, y: (sy - offY) / viewScale };
    }

    // Touch state
    let touches = {};         // id → {x, y}
    let panStart = null;      // {ox, oy, x, y} for single-finger pan
    let pinchStart = null;    // {dist, scale, ox, oy, mx, my}
    let touchMoved = false;   // флаг: было ли движение (подавляет тап)

    function touchDist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }
    function touchMid(a, b) {
      return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    }

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
      const ids = Object.keys(touches);
      touchMoved = false;
      if (ids.length === 1) {
        panStart = { ox: viewOX, oy: viewOY, x: touches[ids[0]].x, y: touches[ids[0]].y };
        pinchStart = null;
      } else if (ids.length === 2) {
        const [a, b] = ids.map(i => touches[i]);
        const mid = touchMid(a, b);
        pinchStart = { dist: touchDist(a, b), scale: viewScale, ox: viewOX, oy: viewOY, mx: mid.x, my: mid.y };
        panStart = null;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
      const ids = Object.keys(touches);
      if (ids.length === 1 && panStart) {
        const cur = touches[ids[0]];
        const dx = cur.x - panStart.x, dy = cur.y - panStart.y;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchMoved = true;
        viewOX = panStart.ox + dx;
        viewOY = panStart.oy + dy;
        clampView();
      } else if (ids.length === 2 && pinchStart) {
        touchMoved = true;
        const [a, b] = ids.map(i => touches[i]);
        const newDist = touchDist(a, b);
        const ratio = Math.max(VIEW_MIN / pinchStart.scale,
                               Math.min(VIEW_MAX / pinchStart.scale, newDist / pinchStart.dist));
        viewScale = pinchStart.scale * ratio;
        // Зумируем строго в точку между пальцами
        viewOX = pinchStart.ox * ratio + (pinchStart.mx - cx) * (1 - ratio);
        viewOY = pinchStart.oy * ratio + (pinchStart.my - cy) * (1 - ratio);
        clampView();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      for (const t of e.changedTouches) delete touches[t.identifier];
      const ids = Object.keys(touches);
      if (ids.length === 1) {
        panStart = { ox: viewOX, oy: viewOY, x: touches[ids[0]].x, y: touches[ids[0]].y };
        pinchStart = null;
      } else if (ids.length === 0) {
        if (!touchMoved) {
          const t = e.changedTouches[0];
          handleTap(screenToWorld(t.clientX, t.clientY));
        }
        panStart = null; pinchStart = null;
      }
    }, { passive: false });

    // ── Stars ─────────────────────────────────────────────────────────
    const STARS = Array.from({ length: 380 }, () => ({
      x:  Math.random(),
      y:  Math.random(),
      r:  Math.random() < 0.88 ? Math.random() * 0.55 + 0.1 : Math.random() * 0.6 + 0.6,
      b:  Math.random() * 0.7 + 0.15,
      sp: Math.random() * 1.4 + 0.3,
      ph: Math.random() * Math.PI * 2,
    }));

    // ── Comets ────────────────────────────────────────────────────────
    const comets = [];
    let nextCometAt = 8000 + Math.random() * 15000;

    function spawnComet(ts) {
      const side = Math.floor(Math.random() * 4);
      let x0, y0, x1, y1;
      const pad = 100;
      if (side === 0)      { x0 = Math.random()*W; y0 = -pad;   x1 = Math.random()*W; y1 = H+pad; }
      else if (side === 1) { x0 = W+pad; y0 = Math.random()*H;  x1 = -pad;   y1 = Math.random()*H; }
      else if (side === 2) { x0 = Math.random()*W; y0 = H+pad;  x1 = Math.random()*W; y1 = -pad; }
      else                 { x0 = -pad; y0 = Math.random()*H;   x1 = W+pad;  y1 = Math.random()*H; }
      comets.push({ x0, y0, x1, y1, start: ts, dur: 5000 + Math.random()*5000, tail: 70 + Math.random()*80 });
    }

    function drawComets(ts) {
      if (ts >= nextCometAt) {
        // 1–3 кометы разом, с небольшим разбросом старта
        const burst = Math.random() < 0.3 ? 2 + Math.floor(Math.random()*2) : 1;
        for (let b = 0; b < burst; b++) {
          setTimeout(() => spawnComet(performance.now()), b * (300 + Math.random()*600));
        }
        // Следующий залп — через 10–50 сек (широкий разброс = «то ничего, то несколько»)
        nextCometAt = ts + 10000 + Math.random() * 40000;
      }
      for (let i = comets.length - 1; i >= 0; i--) {
        const c = comets[i];
        const t = (ts - c.start) / c.dur;
        if (t > 1) { comets.splice(i, 1); continue; }
        const x = c.x0 + (c.x1 - c.x0) * t;
        const y = c.y0 + (c.y1 - c.y0) * t;
        const dx = c.x1 - c.x0, dy = c.y1 - c.y0;
        const len = Math.sqrt(dx*dx + dy*dy);
        const tx = x - (dx/len) * c.tail, ty = y - (dy/len) * c.tail;
        const a = t < 0.12 ? t/0.12 : t > 0.82 ? (1-t)/0.18 : 1;
        ctx.save();
        const grad = ctx.createLinearGradient(x, y, tx, ty);
        grad.addColorStop(0, `rgba(200,225,255,${0.75*a})`);
        grad.addColorStop(1, 'rgba(200,225,255,0)');
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(tx, ty);
        ctx.strokeStyle = grad; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.shadowBlur = 10; ctx.shadowColor = `rgba(170,210,255,${a})`;
        ctx.beginPath(); ctx.arc(x, y, 2.2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(235,245,255,${a})`; ctx.fill();
        ctx.restore();
      }
    }

    // ── Meteors ───────────────────────────────────────────────────────
    const meteors = [];
    let nextMeteorAt = 3000 + Math.random() * 6000;

    function spawnMeteor(ts, delayMs) {
      setTimeout(() => {
        const ang = Math.random() * Math.PI * 2;
        meteors.push({ x: Math.random()*W, y: Math.random()*H, ang,
          spd: 900 + Math.random()*700, tail: 35 + Math.random()*50,
          start: performance.now(), dur: 300 + Math.random()*400 });
      }, delayMs);
    }

    function drawMeteors(ts) {
      if (ts >= nextMeteorAt) {
        // 1–4 метеора разом с небольшим разбросом
        const burst = Math.random() < 0.35 ? 2 + Math.floor(Math.random()*3) : 1;
        for (let b = 0; b < burst; b++) {
          spawnMeteor(ts, b * (100 + Math.random()*300));
        }
        // Следующий залп — через 5–35 сек
        nextMeteorAt = ts + 5000 + Math.random() * 30000;
      }
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        const el = ts - m.start, t = el / m.dur;
        if (t > 1) { meteors.splice(i, 1); continue; }
        const dist = (el/1000) * m.spd;
        const x = m.x + Math.cos(m.ang)*dist, y = m.y + Math.sin(m.ang)*dist;
        const tx = x - Math.cos(m.ang)*m.tail, ty = y - Math.sin(m.ang)*m.tail;
        const a = t < 0.2 ? t/0.2 : 1 - t;
        ctx.save();
        const grad = ctx.createLinearGradient(x, y, tx, ty);
        grad.addColorStop(0, `rgba(255,255,255,${0.9*a})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(tx, ty);
        ctx.strokeStyle = grad; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();
      }
    }

    // ── Moon data ─────────────────────────────────────────────────────
    const MOON_DATA = {
      Mercury: [], Venus: [],
      Earth: [
        { name: 'Луна', color: '#ccc',

        desc: 'Нептун открыли не в телескоп — его вычислили математически: астрономы заметили странные отклонения в орбите Урана и предсказали существование невидимой планеты. Когда навели телескоп в нужную точку — она оказалась именно там. Нептун — планета рекордных ветров: до 2 100 км/ч, самые быстрые в Солнечной системе. С момента открытия в 1846 году он успел сделать чуть больше одного полного оборота вокруг Солнца — его год длится 165 земных лет. «Большое Тёмное Пятно» — аналог Красного Пятна Юпитера — появляется и бесследно исчезает за несколько лет. «Вояджер-2» побывал здесь единственный раз, в 1989 году.'
      },
      {
        name: 'Плутон', body: 'Pluto', color: '#b89080',
        r: 1.5, sma: 39.48,
        prd: '248 лет', diamKm: 2376, prdDays: 90560,
        speedKms: 4.7, moonCount: 5, moonCountNote: 'Харон и 4 малых',
        img: 'planets/pluto.jpg',
        zoomImg: 'planets/pluto.png',
        type: 'Карликовая планета',
        desc: 'Плутон — планета с непростой судьбой. В 2006 году его «разжаловали» в карликовые планеты, и миллионы школьников по всему миру пережили маленькую трагедию. Но сам Плутон не обиделся: в 2015 году зонд New Horizons показал, что он вполне живой. На поверхности — горы из водяного льда высотой 3 500 м и огромная ледяная равнина «Сердце Плутона» размером с Техас. Кратеров на удивление мало: значит, поверхность геологически молодая и продолжает меняться. Один плутонский год равен 248 земным — длиннее, чем вся письменная история человечества. На борту New Horizons летит прах Клайда Томбо, открывшего Плутон в 1930 году.'
      },
    ];

    // ── Simulation ────────────────────────────────────────────────────
    let simTime = new Date();
    const MS_PER_DAY = 86400000;
    const SIM_DAYS_PER_SEC = 1;
    let lastTS = null;
    let planetPos = [];

    // ── Scale: AU → pixels (logarithmic) ─────────────────────────────
    function auToPx(au) {
      const L0 = Math.log10(0.2);
      const L1 = Math.log10(52);
      const lv = Math.log10(Math.max(au, 0.01));
      return 35 + ((lv - L0) / (L1 - L0)) * (maxR * ORBIT_SCALE - 35);
    }

    // Heliocentric (x, y) AU → canvas (px, py)
    function h2s(x, y) {
      const r = Math.sqrt(x * x + y * y);
      const a = Math.atan2(y, x);
      return [cx + auToPx(r) * Math.cos(a), cy - auToPx(r) * Math.sin(a)];
    }

    // ── Draw helpers ──────────────────────────────────────────────────
    function drawStars(t) {
      ctx.save();
      STARS.forEach(s => {
        const alpha = s.b * (0.55 + 0.45 * Math.sin(s.ph + t * s.sp * 0.0008));
        ctx.globalAlpha = Math.max(0.04, alpha);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawSun(t) {
      const p = 1 + 0.04 * Math.sin(t * 0.0007);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 72 * p);
      g.addColorStop(0,    'rgba(255,255,220,0.95)');
      g.addColorStop(0.14, 'rgba(255,200,55,0.7)');
      g.addColorStop(0.42, 'rgba(255,120,0,0.22)');
      g.addColorStop(1,    'rgba(255,50,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, 72 * p, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      // core
      ctx.shadowBlur = 18; ctx.shadowColor = '#ffcc44';
      ctx.beginPath();
      ctx.arc(cx, cy, 11, 0, Math.PI * 2);
      ctx.fillStyle = '#fffce0'; ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
      // label
      ctx.font = '10px sans-serif';
      ctx.fillStyle = 'rgba(255,230,100,0.45)';
      ctx.textAlign = 'center';
      ctx.fillText('Солнце', cx, cy + 22);
    }

    // Saturn rings: C-ring (faint), B-ring (bright), Cassini gap, A-ring, F-ring
    // r = planet radius, front=true draws front half (0..PI), false = back half (PI..2PI)
    function drawSaturnRingHalf(c, cx, cy, r, front) {
      const TILT = 0.215; // ry/rx – viewing angle compression
      const bands = [
        { r0: 1.26, r1: 1.53, color: 'rgba(165,145,68,0.24)' },   // C ring — faint
        { r0: 1.56, r1: 1.93, color: 'rgba(228,208,122,0.66)' },   // B ring — bright
        // gap 1.93–2.02 = Cassini Division (no band drawn)
        { r0: 2.04, r1: 2.28, color: 'rgba(210,190,108,0.48)' },   // A ring
        { r0: 2.33, r1: 2.37, color: 'rgba(200,180,100,0.18)' },   // F ring — narrow
      ];
      const sa = front ? 0       : Math.PI;
      const ea = front ? Math.PI : Math.PI * 2;
      bands.forEach(b => {
        const rxO = b.r1 * r, rxI = b.r0 * r;
        c.save();
        c.beginPath();
        c.ellipse(cx, cy, rxO, rxO * TILT, 0, sa, ea);
        c.ellipse(cx, cy, rxI, rxI * TILT, 0, ea, sa, true);
        c.closePath();
        c.fillStyle = b.color;
        c.fill();
        c.restore();
      });
    }

    function drawOrbit(r) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.065)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    function drawMoon(px, py, angle, dr, color, r = 1.5, alpha = 0.72) {
      if (alpha <= 0) return;
      ctx.beginPath();
      ctx.arc(px + dr * Math.cos(angle), py + dr * Math.sin(angle), r, 0, Math.PI * 2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawLabel(px, py, p) {
      ctx.textAlign = 'center';
      if (p.isEarth) {
        ctx.font = 'bold 11px sans-serif';
        ctx.fillStyle = 'rgba(110,175,255,0.9)';
        ctx.fillText(p.name, px, py - p.r - 6);
        ctx.font = '9px sans-serif';
        ctx.fillStyle = 'rgba(100,160,255,0.55)';
        ctx.fillText('вы здесь', px, py - p.r - 17);
      } else {
        ctx.font = '10px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillText(p.name, px, py - p.r - 6);
      }
    }

    // ── Main render loop ──────────────────────────────────────────────
    function render(ts) {
      if (lastTS !== null) {
        simTime = new Date(simTime.getTime() + ((ts - lastTS) / 1000) * SIM_DAYS_PER_SEC * MS_PER_DAY);
      }
      lastTS = ts;

      // Intro scale
      if (introStart === null) introStart = ts;
      const introElapsed = ts - introStart;
      if (introElapsed < INTRO_DUR) {
        introScale = 3.5 - 2.5 * easeOutCubic(introElapsed / INTRO_DUR);
      } else {
        introScale = 1;
      }
      // Background + stars + meteors + comets — до трансформации (экранные координаты)
      ctx.fillStyle = '#010614';
      ctx.fillRect(0, 0, W, H);
      drawStars(ts);
      drawMeteors(ts);
      drawComets(ts);

      ctx.save();
      // Применяем intro (если активно) поверх пользовательского zoom/pan
      const totalScale = viewScale * (introElapsed < INTRO_DUR ? introScale : 1);
      const introOX = introElapsed < INTRO_DUR ? cx * (1 - introScale) : 0;
      const introOY = introElapsed < INTRO_DUR ? cy * (1 - introScale) : 0;
      ctx.setTransform(
        totalScale, 0, 0, totalScale,
        cx * (1 - viewScale) + viewOX + introOX * viewScale,
        cy * (1 - viewScale) + viewOY + introOY * viewScale
      );

      // Orbit rings
      PLANETS.forEach(p => drawOrbit(auToPx(p.sma)));

      drawSun(ts);

      // Earth position for distance calc
      let earthVec = null;
      try { earthVec = Astronomy.HelioVector(Astronomy.Body.Earth, simTime); } catch(e) {}

      planetPos = [];
      const moonVis = Math.max(0, Math.min(1, (viewScale - 2.5) / 0.5));

      PLANETS.forEach(p => {
        let vec;
        try { vec = Astronomy.HelioVector(Astronomy.Body[p.body], simTime); }
        catch(e) { return; }

        const [px, py] = h2s(vec.x, vec.y);
        const distSun   = Math.sqrt(vec.x**2 + vec.y**2 + vec.z**2);
        const distEarth = earthVec
          ? Math.sqrt((vec.x-earthVec.x)**2+(vec.y-earthVec.y)**2+(vec.z-earthVec.z)**2)
          : null;

        planetPos.push({ ...p, px, py, distSun, distEarth });

        // ── Saturn: back ring half ──
        if (p.hasRings) drawSaturnRingHalf(ctx, px, py, p.r, false);

        // ── Planet body ──
        ctx.shadowBlur = p.r * 2.8; ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(px, py, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

        // Earth indicator ring
        if (p.isEarth) {
          ctx.beginPath();
          ctx.arc(px, py, p.r + 4, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(80,150,255,0.42)';
          ctx.lineWidth = 1; ctx.stroke();
        }

        // ── Saturn: front ring half ──
        if (p.hasRings) drawSaturnRingHalf(ctx, px, py, p.r, true);

        drawLabel(px, py, p);

        // ── Earth's Moon ──
        if (p.hasMoon) {
          try {
            const m = Astronomy.GeoMoon(simTime);
            const eps = 23.44 * Math.PI / 180;
            const my = m.y * Math.cos(eps) + m.z * Math.sin(eps);
            drawMoon(px, py, Math.atan2(my, m.x), p.r + 9, '#ccc', 2, 0.72 * moonVis);
          } catch(e) {}
        }

        // ── Jupiter's Galilean moons ──
        if (p.hasGalilean) {
          try {
            const jm = Astronomy.JupiterMoons(simTime);
            [
              { m: jm.io,       color: '#ffe878', dr: p.r + 8  },
              { m: jm.europa,   color: '#c8d8e0', dr: p.r + 13 },
              { m: jm.ganymede, color: '#9090a8', dr: p.r + 19 },
              { m: jm.callisto, color: '#707070', dr: p.r + 26 },
            ].forEach(({ m, color, dr }) =>
              drawMoon(px, py, Math.atan2(m.y, m.x), dr, color, 1.5, 0.72 * moonVis)
            );
          } catch(e) {}
        }

        // ── Other moons from MOON_DATA (Mars, Saturn, Uranus, Neptune, Pluto) ──
        if (!p.hasMoon && !p.hasGalilean) {
          const moons = MOON_DATA[p.body] || [];
          if (moons.length) {
            const d = simTime.getTime() / MS_PER_DAY;
            const minOff = p.hasRings ? Math.ceil(p.r * 2.5) : p.r + 6;
            moons.forEach((moon, i) => {
              drawMoon(px, py, (d / moon.periodDays) * Math.PI * 2, minOff + i * 7, moon.color, 1.5, 0.72 * moonVis);
            });
          }
        }
      });

      ctx.restore();

      // Date label
      document.getElementById('date-label').textContent = fmtDate(simTime);

      requestAnimationFrame(render);
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function fmtDate(d) {
      const M = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
      return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
    }
    function fmtAU(au)  { return au.toFixed(2) + ' а.е.'; }
    function fmtKm(au)  {
      const km = au * AU_KM;
      return km >= 1e9 ? (km/1e9).toFixed(2)+' млрд км' : (km/1e6).toFixed(0)+' млн км';
    }

    // ── Sun data ──────────────────────────────────────────────────────
    const SUN = {
      name: 'Солнце', body: 'Sun', color: '#ffe566', isSun: true,
      type: 'Жёлтый карлик (G2V)',
      img: 'planets/Sun.jpg',
      desc: 'Солнце содержит 99.86% всей массы Солнечной системы — планеты, астероиды, кометы и всё остальное — это просто пыль вокруг него. Каждую секунду оно превращает 4 миллиона тонн вещества в чистую энергию через ядерный синтез. Фотон, рождённый в ядре, пробирается к поверхности от 10 000 до 170 000 лет — а затем за 8 минут долетает до Земли. Загадочный факт: корона Солнца (внешняя атмосфера) в сотни раз горячее самой поверхности — физики до сих пор не могут объяснить почему. Через ~5 млрд лет Солнце раздуется в красного гиганта и поглотит Землю. Но пока оно только на середине своего жизненного пути.',
    };

    // ── Desc renderer ─────────────────────────────────────────────────
    function renderFacts(elId, desc) {
      document.getElementById(elId).textContent = desc || '';
    }

    // ── Info panel ────────────────────────────────────────────────────
    const panel = document.getElementById('panel');

    function showPanel(p) {
      currentPlanet = p;
      document.getElementById('panel-name').textContent = p.name;
      document.getElementById('panel-name').style.color = p.color;
      document.getElementById('panel-type').textContent = p.type;
      document.getElementById('panel-img').src = p.img || '';

      if (p.isSun) {
        document.getElementById('zoom-btn').style.display = 'none';
        document.getElementById('sl-sun').textContent    = 'Диаметр';
        document.getElementById('sl-earth').textContent  = 'До Земли';
        document.getElementById('sl-period').textContent = 'Возраст';
        document.getElementById('sl-diam').textContent   = 'Температура';
        document.getElementById('sl-speed').textContent  = 'Скорость';
        document.getElementById('sl-moons').textContent  = 'Планет';
        document.getElementById('s-speed-sub').textContent = 'км/с орбита галактики';

        document.getElementById('s-sun-au').textContent  = '1 392 700 км';
        document.getElementById('s-sun-km').textContent  = '109 диаметров Земли';

        let earthDist = 1.0;
        try { const ev = Astronomy.HelioVector(Astronomy.Body.Earth, simTime);
              earthDist = Math.sqrt(ev.x**2 + ev.y**2 + ev.z**2); } catch(e) {}
        document.getElementById('s-earth-au').textContent = fmtAU(earthDist);
        document.getElementById('s-earth-km').textContent = fmtKm(earthDist);

        document.getElementById('s-period').textContent     = '4.6 млрд лет';
        document.getElementById('s-period-sub').textContent = 'ещё ~5 млрд до финала';
        document.getElementById('s-diam').textContent       = '5 778 К';
        document.getElementById('s-diam-sub').textContent   = 'ядро: ~15 млн К';
        document.getElementById('s-speed').textContent      = '220';
        document.getElementById('s-moons').textContent      = '8';
        document.getElementById('s-moons-sub').textContent  = '+ 5 карликовых';
      } else {
        const moons = MOON_DATA[p.body] || [];
        document.getElementById('zoom-btn').style.display = 'block';
        document.getElementById('sl-sun').textContent    = 'До Солнца';
        document.getElementById('sl-earth').textContent  = 'До Земли';
        document.getElementById('sl-period').textContent = 'Период орбиты';
        document.getElementById('sl-diam').textContent   = 'Диаметр';
        document.getElementById('sl-speed').textContent  = 'Скорость';
        document.getElementById('sl-moons').textContent  = 'Спутники';
        document.getElementById('s-speed-sub').textContent = 'км/с по орбите';

        document.getElementById('s-sun-au').textContent = fmtAU(p.distSun);
        document.getElementById('s-sun-km').textContent = fmtKm(p.distSun);

        if (p.isEarth) {
          document.getElementById('s-earth-au').textContent = '— вы здесь —';
          document.getElementById('s-earth-km').textContent = '';
        } else if (p.distEarth != null) {
          document.getElementById('s-earth-au').textContent = fmtAU(p.distEarth);
          document.getElementById('s-earth-km').textContent = fmtKm(p.distEarth);
        }

        document.getElementById('s-period').textContent     = p.prd;
        document.getElementById('s-period-sub').textContent = `${p.prdDays.toLocaleString('ru')} дней`;
        document.getElementById('s-diam').textContent       = p.diamKm.toLocaleString('ru') + ' км';
        document.getElementById('s-diam-sub').textContent   = p.isEarth
          ? 'наша планета' : `${(p.diamKm / 12742).toFixed(2)}× от Земли`;
        document.getElementById('s-speed').textContent      = p.speedKms;
        document.getElementById('s-moons').textContent      = p.moonCount;
        document.getElementById('s-moons-sub').textContent  = p.moonCountNote;
      }

      renderFacts('panel-facts', p.desc || '');
      panel.classList.add('open');
    }

    document.getElementById('panel-close').addEventListener('click', () => { panel.classList.remove('open'); panel.classList.remove('above-zoom'); });
    document.getElementById('now-btn').addEventListener('click', () => { simTime = new Date(); });

    // ── Touch / click (main canvas) ───────────────────────────────────
    function findPlanet(x, y) {
      if (Math.hypot(x - cx, y - cy) < 24) return SUN;
      let best = null, bestDist = Infinity;
      planetPos.forEach(p => {
        const d = Math.hypot(x - p.px, y - p.py);
        const hit = Math.max(p.r + 20, 18);
        if (d < hit && d < bestDist) { bestDist = d; best = p; }
      });
      return best;
    }

    function handleTap(pos) {
      const p = findPlanet(pos.x, pos.y);
      if (p) showPanel(p);
      else if (panel.classList.contains('open')) { panel.classList.remove('open'); panel.classList.remove('above-zoom'); }
    }

    canvas.addEventListener('click', e => handleTap(screenToWorld(e.clientX, e.clientY)));

    // ── Zoom view ─────────────────────────────────────────────────────
    const zoomView   = document.getElementById('zoom-view');
    const zoomCanvas = document.getElementById('zoom-canvas');
    const zctx       = zoomCanvas.getContext('2d');
    let zoomPlanet = null;
    let zoomRAF    = null;
    let zoomMoonPos = [];
    let currentPlanet = null;
    let zoomTime = new Date();

    // ── Zoom-view pan/pinch ───────────────────────────────────────────
    let zVS = 1, zVOX = 0, zVOY = 0;
    const ZV_MIN = 1, ZV_MAX = 6;
    let zTouches = {}, zPanStart = null, zPinchStart = null, zTouchMoved = false;

    function clampZV(zcx, zcy) {
      zVS = Math.max(ZV_MIN, Math.min(ZV_MAX, zVS));
      if (zVS <= 1) { zVOX = 0; zVOY = 0; return; }
      const limit = 220 * (zVS - 1);
      zVOX = Math.max(-limit, Math.min(limit, zVOX));
      zVOY = Math.max(-limit, Math.min(limit, zVOY));
    }

    function zSW(sx, sy, zcx, zcy) { // screen → world for zoom canvas
      return { x: (sx - zcx*(1-zVS) - zVOX) / zVS,
               y: (sy - zcy*(1-zVS) - zVOY) / zVS };
    }

    zoomCanvas.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) zTouches[t.identifier] = { x: t.clientX, y: t.clientY };
      const ids = Object.keys(zTouches);
      zTouchMoved = false;
      const rect = zoomCanvas.getBoundingClientRect();
      if (ids.length === 1) {
        zPanStart = { ox: zVOX, oy: zVOY, x: zTouches[ids[0]].x, y: zTouches[ids[0]].y };
        zPinchStart = null;
      } else if (ids.length === 2) {
        const [a, b] = ids.map(i => zTouches[i]);
        const zW = zoomCanvas.width, zH = zoomCanvas.height;
        const zcx = zW/2, zcy = Math.round(zH*0.42);
        const mx = (a.x+b.x)/2 - rect.left, my = (a.y+b.y)/2 - rect.top;
        zPinchStart = { dist: Math.hypot(a.x-b.x,a.y-b.y), scale: zVS, ox: zVOX, oy: zVOY, mx, my, zcx, zcy };
        zPanStart = null;
      }
    }, { passive: false });

    zoomCanvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) zTouches[t.identifier] = { x: t.clientX, y: t.clientY };
      const ids = Object.keys(zTouches);
      const zW = zoomCanvas.width, zH = zoomCanvas.height;
      const zcx = zW/2, zcy = Math.round(zH*0.42);
      if (ids.length === 1 && zPanStart) {
        const cur = zTouches[ids[0]];
        const dx = cur.x - zPanStart.x, dy = cur.y - zPanStart.y;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) zTouchMoved = true;
        zVOX = zPanStart.ox + dx; zVOY = zPanStart.oy + dy;
        clampZV(zcx, zcy);
      } else if (ids.length === 2 && zPinchStart) {
        zTouchMoved = true;
        const [a, b] = ids.map(i => zTouches[i]);
        const ratio = Math.max(ZV_MIN/zPinchStart.scale, Math.min(ZV_MAX/zPinchStart.scale,
                               Math.hypot(a.x-b.x,a.y-b.y) / zPinchStart.dist));
        zVS = zPinchStart.scale * ratio;
        zVOX = zPinchStart.ox * ratio + (zPinchStart.mx - zPinchStart.zcx) * (1 - ratio);
        zVOY = zPinchStart.oy * ratio + (zPinchStart.my - zPinchStart.zcy) * (1 - ratio);
        clampZV(zPinchStart.zcx, zPinchStart.zcy);
      }
    }, { passive: false });

    zoomCanvas.addEventListener('touchend', e => {
      for (const t of e.changedTouches) delete zTouches[t.identifier];
      const ids = Object.keys(zTouches);
      if (ids.length === 1) {
        zPanStart = { ox: zVOX, oy: zVOY, x: zTouches[ids[0]].x, y: zTouches[ids[0]].y };
        zPinchStart = null;
      } else if (ids.length === 0) {
        if (!zTouchMoved) {
          const t = e.changedTouches[0];
          const rect = zoomCanvas.getBoundingClientRect();
          handleZoomTap(t.clientX - rect.left, t.clientY - rect.top);
        }
        zPanStart = null; zPinchStart = null;
      }
    }, { passive: false });

    // Image cache for planet photos
    const _imgCache = {};
    function getImg(url) {
      if (!url) return null;
      if (!_imgCache[url]) { const i = new Image(); i.src = url; _imgCache[url] = i; }
      return _imgCache[url];
    }
    // Preload all planet images at startup (включая zoomImg — прозрачные PNG)
    [...PLANETS, SUN].forEach(p => { getImg(p.img); if (p.zoomImg) getImg(p.zoomImg); });
    Object.values(MOON_DATA).flat().forEach(m => { getImg(m.img); if (m.zoomImg) getImg(m.zoomImg); });
    let zoomLastTS = null;
    const ZOOM_DAYS_PER_SEC = 0.1;

    function openZoom(planet) {
      zVS = 1; zVOX = 0; zVOY = 0; zTouches = {};
      zoomPlanet = planet;
      panel.classList.remove('open');
      panel.classList.remove('above-zoom');
      document.getElementById('zoom-title').textContent  = planet.name;
      document.getElementById('zoom-title').style.color  = planet.color;
      document.getElementById('moon-info').classList.remove('open');
      zoomTime = new Date(simTime.getTime());
      zoomLastTS = null;
      zoomView.classList.add('open');
      // Ждём загрузки картинки планеты, только потом запускаем рендер
      const imgUrl = planet.zoomImg || planet.img;
      const img = imgUrl ? getImg(imgUrl) : null;
      requestAnimationFrame(() => {
        const canvasH = Math.max(100, zoomCanvas.offsetHeight || (window.innerHeight - 80));
        zoomCanvas.width  = window.innerWidth;
        zoomCanvas.height = canvasH;
        if (zoomRAF) cancelAnimationFrame(zoomRAF);
        if (img && !img.complete) {
          img.onload = () => { zoomRAF = requestAnimationFrame(renderZoom); };
        } else {
          zoomRAF = requestAnimationFrame(renderZoom);
        }
      });
    }

    function closeZoom() {
      zoomView.classList.remove('open');
      document.getElementById('moon-info').classList.remove('open');
      panel.classList.remove('open');
      panel.classList.remove('above-zoom');
      if (zoomRAF) { cancelAnimationFrame(zoomRAF); zoomRAF = null; }
    }

    document.getElementById('zoom-back').addEventListener('click', closeZoom);
    document.getElementById('zoom-btn').addEventListener('click', () => {
      if (currentPlanet) openZoom(currentPlanet);
    });

    function renderZoom(ts) {
      if (!zoomPlanet) return;
      const zW = zoomCanvas.width, zH = zoomCanvas.height;
      if (zW < 10 || zH < 10) { zoomRAF = requestAnimationFrame(renderZoom); return; }
      if (zoomLastTS !== null) {
        zoomTime = new Date(zoomTime.getTime() + ((ts - zoomLastTS) / 1000) * ZOOM_DAYS_PER_SEC * MS_PER_DAY);
      }
      zoomLastTS = ts;
      const zcx = zW / 2, zcy = Math.round(zH * 0.42);

      // Background + stars — до трансформации (фон фиксированный)
      zctx.fillStyle = '#010614';
      zctx.fillRect(0, 0, zW, zH);
      zctx.save();
      STARS.forEach(s => {
        const alpha = s.b * (0.25 + 0.15 * Math.sin(s.ph + ts * s.sp * 0.0008));
        zctx.globalAlpha = Math.max(0.02, alpha);
        zctx.fillStyle = '#fff';
        zctx.beginPath();
        zctx.arc(s.x * zW, s.y * zH, s.r * 0.7, 0, Math.PI * 2);
        zctx.fill();
      });
      zctx.restore();

      // Применяем zoom/pan трансформацию для планеты и лун
      zctx.save();
      zctx.setTransform(zVS, 0, 0, zVS, zcx*(1-zVS)+zVOX, zcy*(1-zVS)+zVOY);

      const moons   = MOON_DATA[zoomPlanet.body] || [];
      const planetR = 44;
      const availR  = Math.min(zcx, zcy - 16) * 0.88;
      // For Saturn: moons must start outside the rings drawn in the PNG.
      // Ring outer edge ≈ planetR / 0.38 (planet body = 38% of image width).
      const ringsOuterR = zoomPlanet.hasRings ? Math.ceil(planetR / 0.38) + 10 : 0;
      const minDisplayR = Math.max(Math.round(planetR * 1.9), ringsOuterR);
      const rawOrbitRs = moons.map(m => m.orbitR);
      const minRaw = Math.min(...rawOrbitRs);
      const maxRaw = Math.max(...rawOrbitRs);
      function moonDisplayR(orbitR) {
        if (moons.length === 1 || maxRaw === minRaw) return (minDisplayR + availR) / 2;
        return minDisplayR + (orbitR - minRaw) / (maxRaw - minRaw) * (availR - minDisplayR);
      }

      // Orbit rings
      moons.forEach(moon => {
        zctx.beginPath();
        zctx.arc(zcx, zcy, moonDisplayR(moon.orbitR), 0, Math.PI * 2);
        zctx.strokeStyle = 'rgba(255,255,255,0.07)';
        zctx.lineWidth = 0.5;
        zctx.stroke();
      });

      // Glow halo — small circle + large blur so glow starts at planet edge
      zctx.save();
      zctx.shadowBlur = planetR * 1.1; zctx.shadowColor = zoomPlanet.color;
      zctx.beginPath(); zctx.arc(zcx, zcy, planetR * 0.72, 0, Math.PI * 2);
      zctx.fillStyle = zoomPlanet.color; zctx.fill();
      zctx.restore();

      // Planet photo
      const pImg = getImg(zoomPlanet.zoomImg || zoomPlanet.img);
      if (pImg && pImg.complete && pImg.naturalWidth > 0) {
        zctx.save();
        const sw = pImg.naturalWidth, sh = pImg.naturalHeight;

        if (zoomPlanet.hasRings) {
          // Saturn: transparent PNG with rings — draw full image, scale to planetR
          const drawW = (planetR * 2) / 0.38;
          const drawH = drawW * sh / sw;
          zctx.drawImage(pImg, zcx - drawW / 2, zcy - drawH / 2, drawW, drawH);
        } else if (zoomPlanet.zoomImg) {
          // Transparent PNG — scale so min dimension = planetR*2, draw centered
          const scale = (planetR * 2) / Math.min(sw, sh);
          const drawW = sw * scale, drawH = sh * scale;
          zctx.drawImage(pImg, zcx - drawW / 2, zcy - drawH / 2, drawW, drawH);
        } else {
          // Fallback (JPG): clip to circle, center-crop square
          zctx.beginPath(); zctx.arc(zcx, zcy, planetR, 0, Math.PI * 2); zctx.clip();
          const sq = Math.min(sw, sh);
          zctx.drawImage(pImg, (sw - sq) / 2, (sh - sq) / 2, sq, sq,
                         zcx - planetR, zcy - planetR, planetR * 2, planetR * 2);
          // Soft sphere shading — highlight top-left, very subtle edge darkening
          const grad = zctx.createRadialGradient(
            zcx - planetR * 0.3, zcy - planetR * 0.3, 0, zcx, zcy, planetR);
          grad.addColorStop(0,   'rgba(255,255,255,0.09)');
          grad.addColorStop(0.55,'rgba(0,0,0,0)');
          grad.addColorStop(1.0, 'rgba(0,0,0,0.18)'); // gentle edge, no black band
          zctx.fillStyle = grad; zctx.fillRect(zcx - planetR, zcy - planetR, planetR * 2, planetR * 2);
        }
        zctx.restore();
      }

      zctx.font = '11px sans-serif';
      zctx.fillStyle = 'rgba(255,255,255,0.35)';
      zctx.textAlign = 'center';
      zctx.fillText(zoomPlanet.name, zcx, zcy - planetR - 10);

      // Moons
      zoomMoonPos = [];
      moons.forEach((moon, i) => {
        let angle;
        if (zoomPlanet.body === 'Earth') {
          try {
            const gm = Astronomy.GeoMoon(zoomTime);
            const eps = 23.44 * Math.PI / 180;
            const moonY = gm.y * Math.cos(eps) + gm.z * Math.sin(eps);
            angle = Math.atan2(moonY, gm.x);
          } catch(e) { angle = (zoomTime.getTime() / MS_PER_DAY / moon.periodDays) * Math.PI * 2; }
        } else if (zoomPlanet.body === 'Jupiter') {
          try {
            const jm = Astronomy.JupiterMoons(zoomTime);
            const arr = [jm.io, jm.europa, jm.ganymede, jm.callisto];
            angle = Math.atan2(arr[i].y, arr[i].x);
          } catch(e) { angle = (zoomTime.getTime() / MS_PER_DAY / moon.periodDays) * Math.PI * 2; }
        } else {
          angle = (zoomTime.getTime() / MS_PER_DAY / moon.periodDays) * Math.PI * 2;
        }

        const or = moonDisplayR(moon.orbitR);
        const mx = zcx + or * Math.cos(angle);
        const my = zcy + or * Math.sin(angle);
        const mr = Math.max(5, Math.round(planetR * moon.diamKm / zoomPlanet.diamKm));
        zoomMoonPos.push({ ...moon, mx, my, mr });

        zctx.shadowBlur = 8; zctx.shadowColor = moon.color;
        const mImg = moon.zoomImg ? getImg(moon.zoomImg) : null;
        if (mImg && mImg.complete && mImg.naturalWidth > 0) {
          zctx.drawImage(mImg, mx - mr, my - mr, mr * 2, mr * 2);
        } else {
          zctx.beginPath();
          zctx.arc(mx, my, mr, 0, Math.PI * 2);
          zctx.fillStyle = moon.color; zctx.fill();
        }
        zctx.shadowBlur = 0; zctx.shadowColor = 'transparent';

        zctx.font = '10px sans-serif';
        zctx.fillStyle = 'rgba(255,255,255,0.6)';
        zctx.textAlign = 'center';
        const labelY = my >= zcy ? my + mr + 11 : my - mr - 5;
        zctx.fillText(moon.name, mx, labelY);
      });

      zctx.restore(); // конец zoom/pan трансформации

      document.getElementById('zoom-date-label').textContent = fmtDate(zoomTime);
      zoomRAF = requestAnimationFrame(renderZoom);
    }

    // ── Moon tap in zoom canvas ───────────────────────────────────────
    // canvasX/canvasY — уже в canvas-пикселях (без rect.left)
    function handleZoomTap(canvasX, canvasY) {
      const zW = zoomCanvas.width, zH = zoomCanvas.height;
      const zcx = zW / 2, zcy = Math.round(zH * 0.42);
      // Обратное преобразование zoom/pan → world координаты
      const { x, y } = zSW(canvasX, canvasY, zcx, zcy);

      if (Math.hypot(x - zcx, y - zcy) < (44 + 12) * Math.max(1, 1/zVS)) {
        document.getElementById('moon-info').classList.remove('open');
        const pData = planetPos.find(p => p.body === zoomPlanet.body) || zoomPlanet;
        showPanel(pData);
        document.getElementById('zoom-btn').style.display = 'none';
        panel.classList.add('above-zoom');
        return;
      }

      let best = null, bestDist = Infinity;
      zoomMoonPos.forEach(m => {
        const d = Math.hypot(x - m.mx, y - m.my);
        if (d < (m.mr + 20) * Math.max(1, 1/zVS) && d < bestDist) { bestDist = d; best = m; }
      });
      if (best) showMoonInfo(best);
      else document.getElementById('moon-info').classList.remove('open');
    }

    zoomCanvas.addEventListener('click', e => {
      const rect = zoomCanvas.getBoundingClientRect();
      handleZoomTap(e.clientX - rect.left, e.clientY - rect.top);
    });

    document.getElementById('moon-info-close').addEventListener('click', () => {
      document.getElementById('moon-info').classList.remove('open');
    });

    function fmtKmRaw(km) {
      return km >= 1e6 ? (km / 1e6).toFixed(2) + ' млн км' : km.toLocaleString('ru') + ' км';
    }

    function showMoonInfo(moon) {
      document.getElementById('moon-info-name').textContent = moon.name;
      document.getElementById('moon-info-name').style.color = moon.color;
      document.getElementById('moon-info-img').src = moon.img || '';
      document.getElementById('moon-info-sub').textContent  = `Спутник ${zoomPlanet.name}`;
      document.getElementById('m-diam').textContent   = moon.diamKm.toLocaleString('ru') + ' км';
      document.getElementById('m-dist').textContent   = fmtKmRaw(moon.distKm);
      document.getElementById('m-period').textContent =
        moon.periodDays >= 1
          ? moon.periodDays.toFixed(2) + ' сут'
          : (moon.periodDays * 24).toFixed(1) + ' ч';
      renderFacts('moon-info-facts', moon.desc || '');
      document.getElementById('moon-info').classList.add('open');
    }

    // ── Intro animation ───────────────────────────────────────────────
    let introScale = 3.5;
    const INTRO_DUR = 1400;
    let introStart = null;
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    // ── Go ────────────────────────────────────────────────────────────
    requestAnimationFrame(render);
  </script>
</body>
</html>
